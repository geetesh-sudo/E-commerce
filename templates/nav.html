<nav>
    <h2>shopsphere</h2>

    <a href="{% url 'home' %}">home</a>
    <a href="{% url 'cart' %}">cart {{ cartproductscount }}</a>

    {% if request.user.is_authenticated %}
        <a href="{% url 'profile' %}">profile</a>
        <a href="{% url 'logout_' %}">logout</a>
    {% else %}
        <a href="{% url 'login_' %}">login</a>
        <a href="{% url 'register' %}">register</a>
    {% endif %}

    {% if request.resolver_match.url_name == 'home' %}
    <form method="GET" action="{% url 'home' %}" style="display:inline;">
        <input type="text" name="q" placeholder="Search products">
        <button type="submit">Search</button>
        <button type="submit" name="trending" value="1">Trending</button>
        <button type="submit" name="offer" value="1">Offers</button>
    </form>
    {% endif %}
</nav>
